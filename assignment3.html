<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Async Weather Tracker</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #56585b;
            color: #333;
            padding: 30px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 25px;
        }

        .top-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .search-section, .weather-section {
            flex: 1;
        }

        .console-section {
            background: white;
        }

        h2 {
            font-size: 16px;
            margin-bottom: 15px;
            color: #474748;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 5px;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            outline: none;
        }

        button {
            padding: 10px 20px;
            background: #41362f;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #f1a47b;
        }

        .history-section {
            margin-top: 20px;
        }

        .history-section h3 {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 10px;
        }

        #historyList {
            list-style: none;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        #historyList li {
            background: #f1f5f9;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            border: 1px solid #e2e8f0;
        }

        #historyList li:hover {
            background: #e2e8f0;
        }

        .weather-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .weather-item {
            background: #f8fafc;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
        }

        .weather-item span {
            display: block;
            font-size: 12px;
            color: #64748b;
        }

        .weather-item strong {
            display: block;
            font-size: 16px;
            margin-top: 4px;
            color: #0f172a;
        }

        .error {
            color: #6b5151;
            font-weight: bold;
        }

        .placeholder-text {
            color: #94a3b8;
            font-style: italic;
        }

        .console-box {
            background: #0f172a;
            color: #5c8f60;
            padding: 15px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 14px;
            min-height: 120px;
            max-height: 200px;
            overflow-y: auto;
        }

        .console-box p {
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1> Async Weather Tracker</h1>
        
        <div class="top-row">
            <div class="card search-section">
                <h2>Search City</h2>
                <div class="input-group">
                    <input type="text" id="cityInput" placeholder="Enter city name">
                    <button id="searchBtn">Search</button>
                </div>
                
                <div class="history-section">
                    <h3>Search History</h3>
                    <ul id="historyList"></ul>
                </div>
            </div>

            <div class="card weather-section">
                <h2>Weather Info</h2>
                <div id="weatherDisplay">
                    <p class="placeholder-text">Enter a city to see weather info.</p>
                </div>
            </div>
        </div>

        <div class="card console-section">
            <h2>Console - Event Loop</h2>
            <div class="console-box" id="consoleBox"></div>
        </div>
    </div>

    <script>
        // Replace with your actual OpenWeatherMap API key
        const API_KEY = 'b364cc00e3e5ad4ba5dba0364a37d5bf'; 

        const searchBtn = document.getElementById('searchBtn');
        const cityInput = document.getElementById('cityInput');
        const weatherDisplay = document.getElementById('weatherDisplay');
        const historyList = document.getElementById('historyList');
        const consoleBox = document.getElementById('consoleBox');

        // Utility to display logs on the screen and in the actual browser console
        function logToConsole(message, isError = false) {
            console.log(message);
            const p = document.createElement('p');
            p.textContent = `> ${message}`;
            if (isError) {
                p.style.color = '#ef4444'; // Red for errors
            }
            consoleBox.appendChild(p);
            consoleBox.scrollTop = consoleBox.scrollHeight;
        }

        // Load history on page startup
        document.addEventListener('DOMContentLoaded', loadHistory);

        // Search Button Event Listener
        searchBtn.addEventListener('click', () => {
            const city = cityInput.value.trim();
            if (city) {
                consoleBox.innerHTML = ''; // Clear previous logs
                executeWeatherSearch(city);
            } else {
                logToConsole('Please enter a city name', true);
            }
        });

        // Function to demonstrate the event loop and execution order
        function executeWeatherSearch(city) {
            logToConsole('Sync Start');

            // Microtask
            Promise.resolve().then(() => logToConsole('Promise.then (Microtask)'));

            // Macrotask
            setTimeout(() => logToConsole('setTimeout (Macrotask)'), 0);

            logToConsole('[ASYNC] START fetching');
            
            // Call the async API fetch function
            fetchWeatherData(city);

            logToConsole('Sync End');
        }

        // Async API Handling & Error Handling
        async function fetchWeatherData(city) {
            try {
                const url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`;
                
                const response = await fetch(url);
                
                if (!response.ok) {
                    // Handle invalid city names or network errors
                    if (response.status === 404) {
                        throw new Error('City not found');
                    } else {
                        throw new Error('Invalid API response or Network error');
                    }
                }

                const data = await response.json();
                logToConsole('[ASYNC] Data received');
                
                displayWeather(data);
                saveToHistory(data.name);

            } catch (error) {
                logToConsole(`Error: ${error.message}`, true);
                weatherDisplay.innerHTML = `<p class="error">❌ ${error.message}</p>`;
            }
        }

        // Update the UI with fetched data
        function displayWeather(data) {
            weatherDisplay.innerHTML = `
                <div class="weather-grid">
                    <div class="weather-item"><span>City</span><strong>${data.name}, ${data.sys.country}</strong></div>
                    <div class="weather-item"><span>Temp</span><strong>${data.main.temp} °C</strong></div>
                    <div class="weather-item"><span>Weather</span><strong>${data.weather[0].main}</strong></div>
                    <div class="weather-item"><span>Humidity</span><strong>${data.main.humidity}%</strong></div>
                    <div class="weather-item"><span>Wind</span><strong>${data.wind.speed} m/s</strong></div>
                </div>
            `;
        }

        // Local Storage Management
        function saveToHistory(city) {
            let history = JSON.parse(localStorage.getItem('weatherHistory')) || [];
            
            // Prevent duplicates
            if (!history.includes(city)) {
                history.unshift(city); // Add to beginning
                if (history.length > 6) {
                    history.pop(); // Keep only recent 6 searches
                }
                localStorage.setItem('weatherHistory', JSON.stringify(history));
                loadHistory();
            }
        }

        function loadHistory() {
            historyList.innerHTML = '';
            let history = JSON.parse(localStorage.getItem('weatherHistory')) || [];
            
            history.forEach(city => {
                const li = document.createElement('li');
                li.textContent = city;
                
                // Re-fetch data when a history item is clicked
                li.addEventListener('click', () => {
                    cityInput.value = city;
                    consoleBox.innerHTML = '';
                    executeWeatherSearch(city);
                });
                
                historyList.appendChild(li);
            });
        }
    </script>
</body>
</html>
